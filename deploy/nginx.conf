server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA-style fallback (single page; everything resolves to index.html).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON data and docs are served as static files.
    types {
        application/json json;
        text/markdown    md;
    }

    # Security headers (static, read-only app; no inline-script eval needed).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_min_length 512;
    gzip_types text/plain text/css text/markdown application/javascript application/json;

    # Cache static assets briefly; data files revalidate.
    location ~* \.(?:css|js)$ { expires 1h; add_header Cache-Control "public"; }
    location ~* \.(?:json|md)$ { add_header Cache-Control "no-cache"; }
}
